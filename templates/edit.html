<!DOCTYPE html>
<html>
<head>
    <title>Edit Note</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Edit Note</h2>

<form method="POST">
    <textarea name="content" rows="5">{{ note["content"] }}</textarea><br><br>
    <button type="submit">Update</button>
    <a href="/">Cancel</a>
</form>
<a href="/?sort=new">Newest</a>
<a href="/?sort=old">Oldest</a>
{% for note in notes %}
<div class="note-card {% if note['pinned'] %}pinned{% endif %}">
  <div class="note-header">
    <span>{{ note["category"] }}</span>
    {% if note["pinned"] %}
      <span class="pin">📌</span>
    {% endif %}
  </div>

  <p>{{ note["content"] }}</p>
</div>
{% endfor %}


</body>
</html>
